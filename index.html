<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRUM & GEN</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cloud cloud-a"></div>
  <div class="cloud cloud-b"></div>
  <div class="grid-overlay"></div>

  <main class="app">
    <header class="hero">
      <h1>DRUM & GEN</h1>
      <p>Y2K Jungle & Drum Bass Generator</p>
    </header>

    <section class="player">
      <button id="playBtn" class="icon-btn" title="Play">▶</button>
      <button id="pauseBtn" class="icon-btn" title="Pause">Ⅱ</button>
      <button id="stopBtn" class="icon-btn" title="Stop">■</button>
      <button id="generateBtn" class="icon-btn" title="Generate">✦</button>
      <button id="randomBtn" class="icon-btn" title="Random">◇</button>
      <button id="exportBtn" class="icon-btn" title="Export MIDI">⇩</button>
    </section>

    <section class="panel">
      <label>
        BPM
        <input id="bpmSlider" type="range" min="150" max="180" value="170" />
        <span id="bpmValue">170</span>
      </label>
    </section>

    <section class="tracks">
      <div class="track" data-track="drums">
        <button class="track-name">DRUMS</button>
        <input type="range" min="0" max="1" step="0.01" value="0.9" />
        <button class="mute icon-small">◉</button>
        <button class="lock icon-small">⌑</button>
      </div>

      <div class="track" data-track="bass">
        <button class="track-name">BASS</button>
        <input type="range" min="0" max="1" step="0.01" value="0.8" />
        <button class="mute icon-small">◉</button>
        <button class="lock icon-small">⌑</button>
      </div>

      <div class="track" data-track="pads">
        <button class="track-name">PADS</button>
        <input type="range" min="0" max="1" step="0.01" value="0.7" />
        <button class="mute icon-small">◉</button>
        <button class="lock icon-small">⌑</button>
      </div>

      <div class="track" data-track="lead">
        <button class="track-name">LEAD</button>
        <input type="range" min="0" max="1" step="0.01" value="0.6" />
        <button class="mute icon-small">◉</button>
        <button class="lock icon-small">⌑</button>
      </div>

      <div class="track" data-track="fx">
        <button class="track-name">FX</button>
        <input type="range" min="0" max="1" step="0.01" value="0.6" />
        <button class="mute icon-small">◉</button>
        <button class="lock icon-small">⌑</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
